<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isabela 🌷</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #fff0f5 0%, #ffe4ef 40%, #ffd6e8 100%);
    font-family: 'Lato', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-tulip { position: fixed; pointer-events: none; opacity: 0.12; font-size: 2rem; animation: sway 4s ease-in-out infinite; }
  @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
  .hero { text-align: center; padding: 60px 30px; z-index: 2; position: relative; }
  .subtitle { font-family: 'Lato', sans-serif; font-weight: 300; color: #d4799a; letter-spacing: 4px; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 20px; }
  .name-btn {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 12vw, 7rem);
    font-weight: 700; color: #c4527a; background: none; border: none; cursor: pointer;
    display: inline-block; position: relative; line-height: 1; letter-spacing: -1px;
    transition: transform 0.2s, color 0.2s;
    text-shadow: 0 2px 20px rgba(196,82,122,0.2);
    -webkit-tap-highlight-color: transparent; padding: 10px 20px;
  }
  .name-btn::after { content: ''; position: absolute; bottom: 8px; left: 20px; right: 20px; height: 3px; background: linear-gradient(90deg, transparent, #f4a0c0, transparent); border-radius: 2px; }
  .name-btn:hover { color: #e0789a; transform: scale(1.04); }
  .name-btn:active { transform: scale(0.97); }
  .hint { margin-top: 16px; color: #e8a0bb; font-size: 0.8rem; letter-spacing: 1px; animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  .bottom-row { display: flex; gap: 12px; margin-top: 40px; font-size: 2.2rem; animation: sway 5s ease-in-out infinite; justify-content: center; }
  .tulip-particle { position: fixed; pointer-events: none; z-index: 999; animation: flyUp var(--dur, 2s) var(--delay, 0s) cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
  @keyframes flyUp {
    0%   { opacity:1; transform:translate(0,0) rotate(var(--rot0)) scale(0.3); }
    15%  { opacity:1; transform:translate(var(--dx15),var(--dy15)) rotate(var(--rot1)) scale(1.2); }
    85%  { opacity:0.8; transform:translate(var(--dx85),var(--dy85)) rotate(var(--rot2)) scale(1); }
    100% { opacity:0; transform:translate(var(--dx100),var(--dy100)) rotate(var(--rot3)) scale(0.5); }
  }
  .heart-burst { position: fixed; pointer-events: none; z-index: 998; font-size: 1.4rem; animation: heartFly var(--dur) var(--delay) ease-out forwards; }
  @keyframes heartFly { 0% { opacity:1; transform:translate(0,0) scale(0.5); } 100% { opacity:0; transform:translate(var(--hx),var(--hy)) scale(1.2); } }
  .ripple { position: fixed; border-radius: 50%; border: 3px solid #f4a0c0; pointer-events: none; z-index: 997; animation: rippleOut 0.8s ease-out forwards; }
  @keyframes rippleOut { 0% { width:0;height:0;opacity:0.8;margin-left:0;margin-top:0; } 100% { width:200px;height:200px;opacity:0;margin-left:-100px;margin-top:-100px; } }
  .love-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0);
    background: rgba(255,255,255,0.95); border: 2px solid #f4a0c0; border-radius: 20px;
    padding: 24px 36px; text-align: center; z-index: 1000;
    box-shadow: 0 8px 40px rgba(196,82,122,0.2);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
    opacity: 0; pointer-events: none; max-width: 90vw;
  }
  .love-msg.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  .love-msg p { font-family: 'Playfair Display', serif; font-style: italic; color: #c4527a; font-size: clamp(1rem,4vw,1.3rem); }
  .love-msg .emoji-row { margin-top: 8px; font-size: 1.5rem; }
</style>
</head>
<body>
<script>
  const bgEmojis=['🌷','🌸','🌺','💮'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='bg-tulip';
    el.textContent=bgEmojis[Math.floor(Math.random()*bgEmojis.length)];
    el.style.left=(Math.random()*100)+'%';
    el.style.top=(Math.random()*100)+'%';
    el.style.fontSize=(1.2+Math.random()*2)+'rem';
    el.style.animationDelay=(Math.random()*4)+'s';
    el.style.animationDuration=(3+Math.random()*4)+'s';
    document.body.appendChild(el);
  }
</script>
<div class="hero">
  <div class="subtitle">✦ para mi amor ✦</div>
  <button class="name-btn" id="nameBtn" onclick="burst(event)">Isabela</button>
  <div class="hint">🌷 toca mi nombre 🌷</div>
  <div class="bottom-row">🌷 🌸 🌷 🌸 🌷</div>
</div>
<div class="love-msg" id="loveMsg">
  <p>"Eres mi flor favorita"</p>
  <div class="emoji-row">🌷💕🌷</div>
</div>
<script>
let msgTimeout,clickCount=0;
const messages=['"Eres mi flor favorita"','"Te quiero muchísimo 💕"','"Cada día contigo es especial"','"Eres lo más lindo de mi vida"','"Mi corazón es tuyo 🌷"'];
function burst(e){
  const btn=document.getElementById('nameBtn');
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const rip=document.createElement('div');
  rip.className='ripple';rip.style.left=cx+'px';rip.style.top=cy+'px';
  document.body.appendChild(rip);setTimeout(()=>rip.remove(),900);
  const tulips=['🌷','🌷','🌸','🌺','🌷','💐','🌷','🌸'];
  const count=22+Math.floor(Math.random()*10);
  for(let i=0;i<count;i++) setTimeout(()=>spawnTulip(cx,cy,tulips[Math.floor(Math.random()*tulips.length)]),i*40);
  for(let i=0;i<10;i++) setTimeout(()=>spawnHeart(cx,cy),i*60+100);
  const msg=document.getElementById('loveMsg');
  msg.querySelector('p').textContent=messages[clickCount%messages.length];
  clickCount++;clearTimeout(msgTimeout);msg.classList.add('show');
  msgTimeout=setTimeout(()=>msg.classList.remove('show'),2200);
}
function spawnTulip(cx,cy,emoji){
  const el=document.createElement('div');el.className='tulip-particle';el.textContent=emoji;
  const angle=(Math.random()*360)*Math.PI/180;
  const speed=120+Math.random()*280;
  const vx=Math.cos(angle)*speed,vy=Math.sin(angle)*speed-(100+Math.random()*200);
  const gravity=300+Math.random()*200,dur=1.4+Math.random()*1.2;
  el.style.setProperty('--dur',dur+'s');el.style.setProperty('--delay','0s');
  el.style.setProperty('--rot0',(Math.random()*60-30)+'deg');
  el.style.setProperty('--rot1',(Math.random()*60-30)+'deg');
  el.style.setProperty('--rot2',(Math.random()*180-90)+'deg');
  el.style.setProperty('--rot3',(Math.random()*360-180)+'deg');
  el.style.setProperty('--dx15',(vx*0.15)+'px');el.style.setProperty('--dy15',(vy*0.15)+'px');
  el.style.setProperty('--dx85',(vx*0.9)+'px');el.style.setProperty('--dy85',(vy*0.9+gravity*0.6)+'px');
  el.style.setProperty('--dx100',vx+'px');el.style.setProperty('--dy100',(vy+gravity)+'px');
  el.style.fontSize=(1.2+Math.random()*1.8)+'rem';
  el.style.left=(cx-16)+'px';el.style.top=(cy-16)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+0.2)*1000);
}
function spawnHeart(cx,cy){
  const el=document.createElement('div');el.className='heart-burst';
  const hearts=['💕','💖','💗','💓','🩷'];
  el.textContent=hearts[Math.floor(Math.random()*hearts.length)];
  const angle=(Math.random()*360)*Math.PI/180,d=80+Math.random()*120,dur=0.8+Math.random()*0.6;
  el.style.setProperty('--dur',dur+'s');el.style.setProperty('--delay','0s');
  el.style.setProperty('--hx',Math.cos(angle)*d+'px');el.style.setProperty('--hy',Math.sin(angle)*d-60+'px');
  el.style.left=cx+'px';el.style.top=cy+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+0.2)*1000);
}
</script>
</body>
</html>
